# config/alert-rules.example.yml
# Example only. Copy to config/alert-rules.yml (gitignored) with your real jobs.
# Phase 1 monitors systemd services, so each job names its `systemd_unit`; the
# freshness thresholds are in MINUTES and should match the job's cadence
# (a daily job is only "late" after ~a day, not after an hour).

jobs:
  - id: daily_sales
    name: Daily Sales Load
    server: server232
    systemd_unit: daily_sales.service
    schedule: "daily 07:00"
    expected_finish_before: "08:00"
    freshness:
      max_delay_minutes_warning: 1500    # ~25h — missed today's run
      max_delay_minutes_critical: 1560   # ~26h
    paths:
      logs: "/var/log/daily_sales"       # optional; systemd status is the main signal
    alerts:
      telegram: true
      whatsapp: false
